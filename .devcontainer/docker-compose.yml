services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/python:3.14-trixie
    container_name: demo-provenance-devcontainer
    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=momademo
    depends_on:
      demo-provenance-postgres-provsql:
        condition: service_healthy

  demo-provenance-postgres-provsql:
    build:
      context: .
      dockerfile: ../dependencies/postgres-provsql/Dockerfile
      args:
        FIXTURES_PATH: postgres-seed
    container_name: demo-provenance-postgres-provsql
    volumes:
      - ./postgres-seed:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=provdemo
      - POSTGRES_PASSWORD=provdemo
      - POSTGRES_DB=mathe
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U provdemo -d mathe" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ap-explanation:
    image: ghcr.io/datagems-eosc/datagems-eosc/ap-explanation:v0.8.0
    container_name: demo-provenance-ap-explanation
    environment:
      - POSTGRES_USER=provdemo
      - POSTGRES_PASSWORD=provdemo
      - POSTGRES_HOST=demo-provenance-postgres-provsql
      - POSTGRES_PORT=5432
      - POSTGRES_TIMESCALE_HOST=postgres-provsql
      - POSTGRES_TIMESCALE_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: always
    depends_on:
      demo-provenance-postgres-provsql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: demo-provenance-redis
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5