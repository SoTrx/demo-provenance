services:
  vpn:
    image: dperson/openvpn-client
    container_name: demo-provenance-vpn
    cap_add:
      - NET_ADMIN
    environment:
      - DEFAULT_GATEWAY=false
    volumes:
      - ${VPN_CONFIG_PATH:-./vpn/config.ovpn}:/vpn/config.ovpn:ro
      - ${VPN_AUTH_PATH:-./vpn/auth.txt}:/vpn/vpn.auth:ro
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    restart: always
    ports:
      - "8502:8501"

  app:
    container_name: demo-provenance-frontend
    network_mode: "service:vpn"
    image: demo-provenance-frontend:latest
    build:
      context: .
      target: prod
    environment:
      - AP_MANAGEMENT_URL=http://ap-explanation:5000
    depends_on:
      vpn:
        condition: service_started
      ap-explanation:
        condition: service_started
      demo-provenance-postgres-provsql:
        condition: service_healthy

  demo-provenance-postgres-provsql:
    build:
      context: dependencies
      dockerfile: postgres-provsql/Dockerfile
      args:
        FIXTURES_PATH: postgres-seed
    container_name: demo-provenance-postgres-provsql
    environment:
      - POSTGRES_USER=provdemo
      - POSTGRES_PASSWORD=provdemo
      - POSTGRES_DB=mathe
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U provdemo -d mathe" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ap-explanation:
    image: ghcr.io/datagems-eosc/datagems-eosc/ap-explanation:v0.8.0
    container_name: demo-provenance-ap-explanation
    environment:
      - POSTGRES_USER=provdemo
      - POSTGRES_PASSWORD=provdemo
      - POSTGRES_HOST=demo-provenance-postgres-provsql
      - POSTGRES_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    restart: always
    depends_on:      
      demo-provenance-postgres-provsql:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: demo-provenance-redis
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vpn_data: